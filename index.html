<!-- ============================================================
     HOME HERO  (stile scuro, coerente col tuo sito)
     ------------------------------------------------------------
     COME SI INSTALLA
     1) In index.html incolla il BLOCCO HTML qui sotto SUBITO DOPO
        <div id="view-home">  e PRIMA di  <div id="showreel" ...>
     2) In style.css incolla il BLOCCO CSS (in fondo a questo file)
        alla fine del foglio.
     3) OPZIONALE ma consigliato: nel tuo style.css il #showreel ha
        padding-top:110px (140px su mobile). Ora la navbar la "scavalca"
        gia' l'hero, quindi puoi abbassarlo per togliere il vuoto:
           #showreel { padding-top: 20px; }
           @media (max-width:600px){ #showreel { padding-top: 20px; } }

     SHOWREEL: quando avrai il montaggio, esporta assets/showreel.mp4,
     elimina l'<img> indicato e togli i commenti al blocco <video>.
============================================================ -->

<!-- ============ BLOCCO HTML ============ -->
<section class="intro-hero wrap">
  <div class="intro-copy">
    <h2 class="intro-headline">Creo <span class="glow-script">mondi</span> in 3D,<br>e scrivo il codice che li muove.</h2>
    <p class="intro-sub">3D Artist &amp; Developer. Da 7 anni nel team creativo di <strong>Alan Walker</strong>, oltre 30 milioni di ascoltatori mensili. Modello, animo e costruisco tool che automatizzano la produzione.</p>
    <div class="intro-cta">
      <button type="button" class="btn-download" onclick="document.getElementById('filters').scrollIntoView({behavior:'smooth', block:'start'})">Guarda i progetti</button>
      <a class="btn-outline" href="CV_3D_Tommy_Hodoroaba_2026.pdf" download>Scarica il CV</a>
    </div>
    <div class="intro-stats">
      <div class="stat"><span class="stat-num">7+</span><span class="stat-label">Anni</span></div>
      <div class="stat-divider"></div>
      <div class="stat"><span class="stat-num">30M+</span><span class="stat-label">Ascoltatori</span></div>
      <div class="stat-divider"></div>
      <div class="stat"><span class="stat-num">15+</span><span class="stat-label">Progetti</span></div>
    </div>
  </div>

  <div class="intro-visual">
    <!-- Visual attuale: immagine. Quando hai lo showreel, elimina questa riga
         e togli i commenti al blocco <video> sotto. -->
    <img src="assets/og-cover.webp" alt="Showreel 3D di Tommy Hodoroaba" class="intro-media" loading="eager">

    <!-- SHOWREEL (da attivare quando pronto):
    <video class="intro-media" src="assets/showreel.mp4" poster="assets/og-cover.webp"
           autoplay muted loop playsinline preload="metadata"></video>
    -->
  </div>
</section>


<!-- ============ BLOCCO CSS (incolla in fondo a style.css) ============

.intro-hero{
  display:grid;
  grid-template-columns:1.05fr 0.95fr;
  gap:48px;
  align-items:center;
  padding-top:140px;
  padding-bottom:10px;
}
.intro-headline{
  font-family:'Space Grotesk',sans-serif;
  font-weight:900;
  font-size:clamp(2rem,4.4vw,3.4rem);
  line-height:1.05;
  letter-spacing:-1px;
  margin:0 0 20px;
}
.intro-sub{
  font-size:clamp(1rem,1.6vw,1.15rem);
  color:var(--text-gray);
  line-height:1.65;
  max-width:540px;
  margin:0 0 28px;
}
.intro-sub strong{ color:var(--white); }
.intro-cta{ display:flex; gap:12px; flex-wrap:wrap; margin-bottom:34px; }
.intro-cta .btn-outline{ margin-left:0; }
.intro-stats{ display:flex; align-items:center; gap:0 4px; }
.intro-visual{
  position:relative;
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--glass-border);
  box-shadow:0 24px 70px rgba(0,40,140,0.35);
  aspect-ratio:16/10;
  background:var(--panel-bg);
}
.intro-media{ width:100%; height:100%; object-fit:cover; display:block; }

@media (max-width:900px){
  .intro-hero{ grid-template-columns:1fr; gap:26px; padding-top:130px; }
  .intro-visual{ aspect-ratio:16/9; order:-1; }
}
@media (max-width:600px){
  .intro-hero{ padding-top:120px; }
  .intro-stats{ gap:12px; }
}

============ FINE BLOCCO CSS ============ -->
